<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard — CareMate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <div class="container">
    <div id="nav-root"></div>

    <main id="main">
      <div style="padding:20px 0 4px">
        <h1 class="page-title" id="dash-title">My Dashboard</h1>
        <p class="page-desc" id="dash-sub">Manage your bookings and profile.</p>
      </div>

      <!-- Stat row -->
      <div class="stat-row" id="stats-row" style="margin-top:18px"></div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('upcoming')">Upcoming</button>
        <button class="tab-btn"        onclick="switchTab('completed')">Completed</button>
        <button class="tab-btn"        onclick="switchTab('profile')">Profile</button>
      </div>

      <div class="tab-panel active" id="panel-upcoming"></div>
      <div class="tab-panel"        id="panel-completed"></div>
      <div class="tab-panel"        id="panel-profile"></div>
    </main>

    <footer>
      <div class="footer-inner">
        <div><strong>CareMate</strong> · Trusted hospital companionship · © 2026</div>
        <div style="display:flex;gap:16px"><a href="#">Privacy</a><a href="#">Terms</a><a href="#">Contact</a></div>
      </div>
    </footer>
  </div>

  <!-- Review modal -->
  <div class="modal-overlay" id="review-modal" role="dialog" aria-modal="true">
    <div class="modal" style="max-width:440px">
      <div class="modal-header">
        <h2 class="modal-title">Leave a review</h2>
        <button class="modal-close" onclick="closeReview()">×</button>
      </div>
      <p style="font-size:14px;color:var(--muted);margin-bottom:16px" id="review-cg-name"></p>
      <div class="form-group">
        <label>Your rating</label>
        <div class="star-picker" id="star-picker">
          <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span>
          <span data-v="4">★</span><span data-v="5">★</span>
        </div>
      </div>
      <div class="form-group">
        <label for="review-text">Your review</label>
        <textarea class="form-control" id="review-text" rows="3" placeholder="Share your experience…" style="resize:vertical"></textarea>
        <div class="form-error" id="review-err">Please write a short review.</div>
      </div>
      <button class="btn btn-primary btn-lg" onclick="submitReview()">Submit review</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    Nav.render('#nav-root', 'dashboard');
    if (!Auth.requireAuth('auth.html?next=dashboard.html')) throw '';

    const user = Auth.currentUser();
    document.getElementById('dash-title').textContent = 'Welcome, ' + user.name.split(' ')[0] + '!';
    document.getElementById('dash-sub').textContent   = 'Here are your bookings and profile settings.';

    // ── Sample pre-seeded bookings for demo feel ──────────
    const DEMO = [
      {
        id:'demo1', userId: user.email, caregiverId:'cg1', caregiverName:'Anjali Sharma',
        patientName:'Ramesh Kumar', hospital:'Apollo Hospitals', ward:'Ward 3B',
        date: (() => { const d=new Date(); d.setDate(d.getDate()+3); return d.toISOString().split('T')[0]; })(),
        startTime:'10:00', durationHours:8, totalPrice:3024, status:'upcoming',
        notes:'', createdAt: new Date().toISOString(),
      },
      {
        id:'demo2', userId: user.email, caregiverId:'cg3', caregiverName:'Meera Iyer',
        patientName:'Ramesh Kumar', hospital:'Fortis Hospital', ward:'Room 12',
        date: (() => { const d=new Date(); d.setDate(d.getDate()-10); return d.toISOString().split('T')[0]; })(),
        startTime:'08:00', durationHours:4, totalPrice:1680, status:'completed',
        notes:'', createdAt: new Date(Date.now()-864000000).toISOString(),
      },
    ];

    // Merge demo bookings (only add if not already present)
    const existing = Bookings.getAll();
    DEMO.forEach(d => { if (!existing.find(b => b.id === d.id)) existing.push(d); });
    sessionStorage.setItem('cm_bookings', JSON.stringify(existing));

    // ── Stats ──────────────────────────────────────────────
    function renderStats() {
      const all      = Bookings.getByUser(user.email);
      const upcoming = all.filter(b => b.status === 'upcoming').length;
      const total    = all.filter(b => b.status !== 'cancelled').length;
      const spend    = all.filter(b => b.status === 'completed').reduce((s,b) => s + b.totalPrice, 0);
      document.getElementById('stats-row').innerHTML = `
        <div class="stat-card"><div class="val">${upcoming}</div><div class="lbl">Upcoming bookings</div></div>
        <div class="stat-card"><div class="val">${total}</div><div class="lbl">Total bookings</div></div>
        <div class="stat-card"><div class="val">${Utils.currency(spend)}</div><div class="lbl">Total spent</div></div>
      `;
    }

    // ── Render booking cards ───────────────────────────────
    function renderUpcoming() {
      const list = Bookings.getByUser(user.email).filter(b => b.status === 'upcoming');
      const el   = document.getElementById('panel-upcoming');
      if (!list.length) {
        el.innerHTML = `<div class="empty"><div class="icon">📅</div><h3>No upcoming bookings</h3><p>Browse caregivers to make your first booking.</p><a class="btn btn-primary" href="caregivers.html" style="margin-top:12px">Browse caregivers</a></div>`;
        return;
      }
      el.innerHTML = list.map(b => bookingCard(b, true)).join('');
    }

    function renderCompleted() {
      const list = Bookings.getByUser(user.email).filter(b => b.status === 'completed' || b.status === 'cancelled');
      const el   = document.getElementById('panel-completed');
      if (!list.length) {
        el.innerHTML = `<div class="empty"><div class="icon">✅</div><h3>No completed bookings yet</h3></div>`;
        return;
      }
      el.innerHTML = list.map(b => bookingCard(b, false)).join('');
    }

    function bookingCard(b, isUpcoming) {
      const cg = Caregivers.get(b.caregiverId);
      const avatar = cg
        ? `<div class="avatar" style="background:${cg.avatarBg};color:${cg.avatarColor};flex-shrink:0">${cg.initials}</div>`
        : `<div class="avatar" style="background:#f1f5f9;color:var(--muted)">${b.caregiverName.split(' ').map(n=>n[0]).join('').slice(0,2)}</div>`;

      const actions = isUpcoming
        ? `<a class="btn btn-ghost btn-sm" href="messages.html?bookingId=${b.id}">💬 Message</a>
           <button class="btn btn-danger btn-sm" onclick="cancelBooking('${b.id}')">Cancel</button>`
        : b.status === 'completed'
          ? `<button class="btn btn-ghost btn-sm" onclick="openReview('${b.id}','${b.caregiverName}')" id="rv-btn-${b.id}">⭐ Leave review</button>`
          : '';

      return `
        <div class="booking-item" id="bk-${b.id}">
          ${avatar}
          <div class="booking-body">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span class="booking-title">${b.caregiverName}</span>
              ${Utils.statusBadge(b.status)}
            </div>
            <div class="booking-meta">
              <strong>Patient:</strong> ${b.patientName}<br>
              <strong>Hospital:</strong> ${b.hospital}${b.ward ? ' · ' + b.ward : ''}<br>
              <strong>Date:</strong> ${Utils.formatDate(b.date + 'T12:00:00')} at ${Utils.formatTime(b.startTime)} · ${b.durationHours} hrs<br>
              <strong>Total:</strong> ${Utils.currency(b.totalPrice)}
            </div>
            <div class="booking-actions">${actions}</div>
          </div>
        </div>`;
    }

    // ── Profile tab ────────────────────────────────────────
    function renderProfile() {
      document.getElementById('panel-profile').innerHTML = `
        <div style="max-width:480px">
          <div class="card">
            <h3 style="font-size:16px;font-weight:700;margin-bottom:18px">Profile settings</h3>
            <div class="form-group">
              <label>Full name</label>
              <input class="form-control" type="text" id="p-name" value="${escapeHtml(user.name)}">
            </div>
            <div class="form-group">
              <label>Email address</label>
              <input class="form-control" type="email" value="${escapeHtml(user.email)}" disabled style="opacity:.6;cursor:not-allowed">
            </div>
            <button class="btn btn-primary" onclick="saveProfile()">Save changes</button>
          </div>
          <div style="margin-top:20px">
            <button class="btn btn-danger" onclick="if(confirm('Sign out?')) Auth.logout()">Sign out</button>
          </div>
        </div>`;
    }

    function saveProfile() {
      const name = document.getElementById('p-name').value.trim();
      if (!name) { Toast.show('Name cannot be empty.', 'error'); return; }
      sessionStorage.setItem('cm_user', JSON.stringify({ ...user, name }));
      Toast.show('Profile updated!', 'success');
    }

    // ── Cancel booking ─────────────────────────────────────
    function cancelBooking(id) {
      if (!confirm('Cancel this booking? This cannot be undone.')) return;
      Bookings.cancel(id);
      Toast.show('Booking cancelled.', 'info');
      renderAll();
    }

    // ── Review ─────────────────────────────────────────────
    let _reviewBookingId = null, _reviewRating = 0;

    function openReview(bookingId, cgName) {
      _reviewBookingId = bookingId; _reviewRating = 0;
      document.getElementById('review-cg-name').textContent = 'Reviewing your experience with ' + cgName;
      document.getElementById('review-text').value = '';
      document.getElementById('review-err').classList.remove('show');
      updateStars(0);
      document.getElementById('review-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeReview() {
      document.getElementById('review-modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('review-modal').addEventListener('click', function(e) {
      if (e.target === this) closeReview();
    });

    document.getElementById('star-picker').addEventListener('click', function(e) {
      const v = +e.target.dataset.v;
      if (v) { _reviewRating = v; updateStars(v); }
    });

    function updateStars(v) {
      document.querySelectorAll('#star-picker span').forEach(s => s.classList.toggle('on', +s.dataset.v <= v));
    }

    function submitReview() {
      const text = document.getElementById('review-text').value.trim();
      const err  = document.getElementById('review-err');
      if (!_reviewRating) { err.textContent = 'Please select a rating.'; err.classList.add('show'); return; }
      if (!text) { err.textContent = 'Please write a short review.'; err.classList.add('show'); return; }
      err.classList.remove('show');
      closeReview();
      // Replace the "Leave review" button with a confirmation
      const btn = document.getElementById('rv-btn-' + _reviewBookingId);
      if (btn) btn.outerHTML = '<span style="font-size:13px;color:#166534;font-weight:600">✓ Review submitted</span>';
      Toast.show('Thanks for your review!', 'success');
    }

    // ── Tab switching ──────────────────────────────────────
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        const names = ['upcoming','completed','profile'];
        btn.classList.toggle('active', names[i] === name);
      });
      document.querySelectorAll('.tab-panel').forEach((p, i) => {
        const names = ['upcoming','completed','profile'];
        p.classList.toggle('active', names[i] === name);
      });
    }

    function renderAll() { renderStats(); renderUpcoming(); renderCompleted(); renderProfile(); }

    function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    renderAll();
  </script>
</body>
</html>
